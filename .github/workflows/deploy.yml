name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-target-

      - name: Get wasm-bindgen version
        id: wasm-bindgen-version
        run: |
          VERSION=$(awk '/^name = "wasm-bindgen"$/ { found=1 } found && /^version/ { gsub(/"/, "", $3); print $3; exit }' Cargo.lock)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache wasm-bindgen-cli binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-bindgen
          key: ${{ runner.os }}-wasm-bindgen-${{ steps.wasm-bindgen-version.outputs.version }}

      - name: Install wasm-bindgen-cli
        run: |
          VERSION="${{ steps.wasm-bindgen-version.outputs.version }}"
          if ! wasm-bindgen --version 2>/dev/null | grep -q "$VERSION"; then
            echo "Installing wasm-bindgen-cli $VERSION"
            cargo install wasm-bindgen-cli --version "$VERSION" --locked
          else
            echo "wasm-bindgen-cli $VERSION already cached, skipping"
          fi

      - name: Build WASM
        # Run everything except the final http.server line
        run: |
          chmod +x build-wasm.sh
          head -n -2 build-wasm.sh | bash

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
